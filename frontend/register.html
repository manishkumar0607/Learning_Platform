<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — LearnOS</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">Learn<span>OS</span></a>
    <div class="nav-links">
      <a href="index.html">Resources</a>
      <a href="login.html" class="btn btn-outline" style="font-size:0.78rem;padding:0.4rem 1rem;">Login</a>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-box">

      <!-- Top label -->
      <div class="hero-tag" style="margin-bottom:1.2rem;">✦ Join for free</div>

      <h2>Create account</h2>
      <p class="subtitle">Start accessing free learning resources today.</p>

      <!-- Message area -->
      <div class="msg" id="msg"></div>

      <!-- Form -->
      <div class="form-group">
        <label for="reg-name">Username</label>
        <input type="text" id="reg-name" placeholder="e.g. devlearner42" autocomplete="username" />
      </div>

      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Choose a strong password" autocomplete="new-password" />
      </div>

      <div class="form-group">
        <label for="reg-confirm">Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Repeat your password" autocomplete="new-password" />
      </div>

      <button class="btn btn-primary btn-full" onclick="register()" id="reg-btn">
        Create Account →
      </button>

      <div class="auth-divider">or</div>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Log in here</a>
      </div>

    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    async function register() {
      const name     = document.getElementById('reg-name').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;
      const msg      = document.getElementById('msg');
      const btn      = document.getElementById('reg-btn');

      // Reset
      msg.className = 'msg';
      msg.textContent = '';

      // Validate
      if (!name || !password || !confirm) {
        return showMsg(msg, 'error', 'All fields are required.');
      }
      if (password.length < 6) {
        return showMsg(msg, 'error', 'Password must be at least 6 characters.');
      }
      if (password !== confirm) {
        return showMsg(msg, 'error', 'Passwords do not match.');
      }

      btn.textContent = 'Creating account...';
      btn.disabled = true;

      try {
        const res  = await fetch('https://learning-platform-pe0r.onrender.com/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showMsg(msg, 'error', data.message || 'Registration failed.');
        } else {
          showMsg(msg, 'success', '✓ Account created! Redirecting to login...');
          setTimeout(() => window.location.href = 'login.html', 1500);
        }
      } catch (e) {
        showMsg(msg, 'error', 'Cannot connect to server. Is it running?');
      }

      btn.textContent = 'Create Account →';
      btn.disabled = false;
    }

    function showMsg(el, type, text) {
      el.className = 'msg ' + type + ' show';
      el.textContent = text;
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') register();
    });
  </script>
</body>
</html>
